name: 'Deploy to CloudPanel (Vultr)'

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Build Frontend
        run: npm run build
        
      - name: Deploy Securely via Rsync
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./*"
          target: "${{ secrets.SERVER_DESTINATION_PATH }}"
          rm: false
          
      - name: Restart PM2 Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export PATH=$PATH:/usr/local/bin:~/bin:~/.npm-global/bin
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd ${{ secrets.SERVER_DESTINATION_PATH }}
            
            # Elite Premium Engineering: Injeção Segura de Váriaveis na Nuvem (Blindado contra logs)
            echo "PORT=3001" > .env
            echo "NODE_ENV=production" >> .env
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
            echo "NVIDIA_API_KEY=${{ secrets.NVIDIA_API_KEY }}" >> .env
            
            npm install --omit=dev
            if ! command -v pm2 &> /dev/null; then npm install -g pm2; fi
            pm2 delete global-health-monitor || true
            
            # Elite Premium Engineering: Trojan Horse Data Migration
            # O Node PM2 acaba de morrer, e a database local está destrancada. Injetamos o Snapshot de Conhecimento por cima.
            if [ -f migration_lake.sqlite ]; then
              mv migration_lake.sqlite health_data.sqlite
              echo "✅ Data Lake transferido e sobreposto com sucesso!"
            fi
            
            pm2 start ecosystem.config.cjs --env production
            pm2 save
            sleep 5
            pm2 status
            pm2 logs global-health-monitor --lines 50 --nostream
